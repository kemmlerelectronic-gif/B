<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEMMSOFT 4.0 Testing</title>

<style>
/* Základní styly */
body{
font-family: 'Segoe UI', Arial, sans-serif; 
background:url("background.png") center/cover fixed; 
margin:0;
color:white;
overflow-x: hidden; 
}
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
z-index:-1;
}
.topbarContainer{ 
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 25px;
background: rgba(0, 0, 0, 0.6); 
box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
transition: all 0.3s ease; 
gap: 20px;
}
.topbarContainer.hidden { 
    transform: translateY(-100%);
    opacity: 0;
    pointer-events: none; 
    display: none !important; 
}

.kemmsTop { 
    font-size: 38px; 
    font-weight: 900; 
    background: linear-gradient(45deg, #22c55e, #34d399); 
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6); 
    letter-spacing: 1px; 
    transition: all 0.3s ease;
    animation: logoPulse 4s infinite alternate ease-in-out;
    white-space: nowrap;
}
@keyframes logoPulse {
    0% { text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6); }
    50% { text-shadow: 0 0 8px rgba(22, 101, 52, 0.7); }
    100% { text-shadow: 0 0 15px rgba(34, 197, 94, 0.8), 0 0 25px rgba(52, 211, 153, 0.6); }
}

/* ROLUJÍCÍ VZKAZY V TOPBARU */
.vzkazTickerContainer {
    flex-grow: 1;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.4);
    border-left: 3px solid #22c55e;
    border-right: 3px solid #22c55e;
    padding: 8px 10px;
    margin: 0 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
}
.vzkazTicker {
    white-space: nowrap;
    display: inline-block;
    font-size: 22px;
    font-weight: bold;
    color: #fef08a; 
    text-shadow: 0 0 8px rgba(234, 179, 8, 0.6);
    animation: tickerLoop 30s linear infinite;
    padding-left: 100%;
}
@keyframes tickerLoop {
    0% { transform: translate3d(0, 0, 0); }
    100% { transform: translate3d(-100%, 0, 0); }
}

.topbar {
    white-space: nowrap;
}
.topbar button{ 
padding:12px 22px; 
margin-left:10px; 
border:none;
border-radius:8px; 
background: linear-gradient(135deg, #22c55e, #1a9a4e); 
color:white;
cursor:pointer;
font-size: 1.1em; 
font-weight: 600; 
box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); 
transition: all 0.3s ease; 
position: relative;
overflow: hidden; 
}
.topbar button::before { 
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.1);
    transform: skewX(-30deg);
    transition: all 0.5s ease;
}
.topbar button:hover::before { left: 100%; }
.topbar button:hover {
    background: linear-gradient(135deg, #1a9a4e, #22c55e); 
    transform: translateY(-3px) scale(1.02); 
    box-shadow: 0 8px 25px rgba(34, 197, 94, 0.6); 
}
.topbar button.active-nav {
    background: linear-gradient(135deg, #0f4f2c, #166534); 
    box-shadow: 0 2px 10px rgba(34, 197, 94, 0.8), inset 0 0 8px rgba(34, 197, 94, 0.6);
    transform: translateY(0);
    border: 1px solid #22c55e;
}

.header{
text-align:center;
font-size:68px; 
background:#111827cc;
padding:10px;
transition: all 0.3s ease;
text-shadow: 2px 2px 8px rgba(0,0,0,0.7); 
border-bottom: 2px solid rgba(34, 197, 94, 0.5); 
min-height: 100px; 
display: flex; 
align-items: center;
justify-content: center;
}
@keyframes headerBlink {
  0%, 100% { color: #22c55e; text-shadow: 0 0 15px #22c55e; }
  50% { color: #ffffff; text-shadow: none; }
}
.header.blink { animation: headerBlink 1s infinite; } 

.layout{
display:grid;
grid-template-columns:4fr 1.3fr;
gap:20px;
padding:20px;
}
.rowTop{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:20px; }
.rowBottom{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }

.card{
background: linear-gradient(145deg, #020617ee, #111827ee); 
padding:25px;
border-radius:22px; 
text-align:center;
transition: all .4s ease-out; 
position: relative;
box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 10px rgba(255,255,255,0.05); 
border: 1px solid rgba(34, 197, 94, 0.15); 
}

.card.assigned{
background: linear-gradient(145deg, #16653499, #1a9a4e99); 
color: #e0ffe0; 
box-shadow: 0 0 30px rgba(34, 197, 94, 0.7), inset 0 0 15px rgba(34, 197, 94, 0.5); 
border-color: #22c55e;
animation: pulseBorder 2s infinite ease-in-out; 
}
@keyframes pulseBorder {
    0% { border-color: rgba(34, 197, 94, 0.5); box-shadow: 0 0 30px rgba(34, 197, 94, 0.7), inset 0 0 15px rgba(34, 197, 94, 0.5); }
    50% { border-color: rgba(34, 197, 94, 0.9); box-shadow: 0 0 45px rgba(34, 197, 94, 0.9), inset 0 0 20px rgba(34, 197, 94, 0.7); }
    100% { border-color: rgba(34, 197, 94, 0.5); box-shadow: 0 0 30px rgba(34, 197, 94, 0.7), inset 0 0 15px rgba(34, 197, 94, 0.5); }
}

.card.active{

color: #000; 
box-shadow: 0 0 80px rgba(34, 197, 94, 0.9), 0 0 30px rgba(255,255,255,0.6); 
transform: scale(1.08); 
border-color: #22c55e;
animation: cardActiveScale 1.2s forwards; 
}
@keyframes cardActiveScale {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1.08); }
}

.lis {
    font-size: 40px; 
    font-weight: 900; 
    background: linear-gradient(45deg, #6ee7b7, #34d399); 
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

.card .kontakt{font-size:38px;color:#22d3ee; margin-top: 20px; font-weight: 800;}

.hotovo{ 
margin-top:15px;
padding:8px 18px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;

box-shadow: 0 4px 8px rgba(239, 68, 68, 0.4);

.hotovo:hover { background: #dc2626; transform: translateY(-2px); }

.queue{

/* SEKCE PRO VZKAZY */
.vzkazSection {

    padding-top: 15px;
    border-top: 2px dashed rgba(34, 197, 94, 0.3);
}
.vzkazyList {

.vzkazItem {

    background: #1e293b77;

.qrContainer {

.queueItem{
padding:15px; 
border-bottom:1px solid #1e293b;
margin-bottom:12px;

background: #020617aa; 
border-radius: 8px;
box-shadow: 0 2px 8px rgba(0,0,0,0.3);

    50% { background: linear-gradient(145deg, #FFECB3, #FFD700); transform: scale(1.08); color: #000; }
    100% { background: #020617aa; transform: scale(1); color: white; }
}

.assign button{

padding:6px 10px;
border:none;
border-radius:6px;

.assign .deleteBtn:hover { background: #dc2626; }

input{ 
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #1e293b;
background: #0f172a;
color: white;
box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);

.addBtn{ 
width:100%;
padding:12px;
background: linear-gradient(90deg, #3b82f6, #60a5fa); 
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-size: 1.1em;
font-weight: bold;
box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);

}
.vzkazBtn {
    background: linear-gradient(90deg, #eab308, #ca8a04);
    box-shadow: 0 4px 10px rgba(234, 179, 8, 0.3);
}
.vzkazBtn:hover { background: linear-gradient(90deg, #ca8a04, #eab308); }

#requestsScreen{ 
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: calc(100vh - 50px);
}
#requestsScreen > div { 
    max-width: 90%; 
    width: 400px; 
    margin: 20px auto; 
    padding: 25px; 
    background: linear-gradient(145deg, #020617ee, #111827ee);
    border-radius: 22px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.7);
    border: 2px solid rgba(34, 197, 94, 0.5);
}
#requestsScreen h3 { 
    color: #22c55e;
    text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
    margin-bottom: 30px; 
    font-size: 2.2em; 
}

@media screen and (max-width: 600px) {
    #requestsScreen > div { width: 95%; padding: 30px; margin: 10px auto; }
    #requestsScreen h3 { font-size: 2.5em; margin-bottom: 25px; }
    input { padding: 15px; font-size: 1.1em; }
    .addBtn { padding: 15px; font-size: 1.2em; }
}

.production{display:none} 
.blink{animation:blinkAnim 1s infinite;}
@keyframes blinkAnim{
0%{background:#22c55e}
50%{background:#111827}
100%{background:#22c55e}
}
</style>
</head>

<body>

<div class="topbarContainer" id="mainTopbarContainer">
<div class="kemmsTop">KEMMSOFT BETA 4.5.1</div>

<div class="topbar" id="topbar">
<button id="nav-setup" class="active-nav" onclick="setupMode()">Nastavení</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={
    apiKey:"AIzaSyAhiCfh-Di_NdPO5rGM7CZFQGaSymcdWxI",
    authDomain:"lisyweb-df6d9.firebaseapp.com",
    databaseURL:"https://lisyweb-df6d9-default-rtdb.firebaseio.com/",
    projectId:"lisyweb-df6d9"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const LIS_COUNT=8;
let lisy=[];
let pozadavky=[];
let lastPozadavky = []; 
let lastLisy=[]; 

// Globální audio kontext
let audioCtx = null;

function emptyLis(){ return {kontakt:"",prurez:"",jmeno:"",time:""} }
function timeNow(){ return new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}) }

// POJISTKA PRO AUDIO: Inicializuje nebo probudí audio kontext po interakci uživatele
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

// Navázání odemčení zvuku na kliknutí kdekoliv na stránce
document.addEventListener('click', initAudio, { once: false });

window.setupMode = function() {
    initAudio();
    document.getElementById("setupScreen").style.display = "block";
    document.getElementById("productionScreen").style.display = "none";
    document.getElementById("requestsScreen").style.display = "none";
    document.getElementById("productionFixedQrContainer").style.display = "none"; 
    document.getElementById("mainTopbarContainer").classList.remove("hidden"); 
    updateActiveNav("nav-setup");
}

window.productionMode = function() {
    initAudio();
    document.getElementById("setupScreen").style.display = "none";
    document.getElementById("productionScreen").style.display = "block";
    document.getElementById("requestsScreen").style.display = "none";
    document.getElementById("productionFixedQrContainer").style.display = "block"; 
    document.getElementById("mainTopbarContainer").classList.remove("hidden"); 
    updateActiveNav("nav-production");
}

window.requestsMode = function() {
    initAudio();
    document.getElementById("setupScreen").style.display = "none";
    document.getElementById("productionScreen").style.display = "none";
    document.getElementById("requestsScreen").style.display = "flex";
    document.getElementById("productionFixedQrContainer").style.display = "none"; 
    
    if(window.location.hash === "#requests") {
        document.getElementById("mainTopbarContainer").classList.add("hidden"); 
    } else {
        document.getElementById("mainTopbarContainer").classList.remove("hidden");
    }
    
    updateActiveNav("nav-requests");
}

function updateActiveNav(activeId) {
    document.getElementById("nav-setup").classList.remove("active-nav");
    document.getElementById("nav-production").classList.remove("active-nav");
    document.getElementById("nav-requests").classList.remove("active-nav");
    document.getElementById(activeId).classList.add("active-nav");
}

window.playTone = function() {
    try {
        initAudio();
        if (!audioCtx) return;

        // --- 1. TÓN: "DING" (Vysoký tón) ---
        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();
        
        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);
        
        osc1.frequency.value = 587.33; // Tón D5 (jasný vysoký začátek)
        gain1.gain.setValueAtTime(0.25, audioCtx.currentTime);
        // Plynulé utišení prvního tónu
        gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        
        osc1.start(audioCtx.currentTime);
        osc1.stop(audioCtx.currentTime + 0.4);

        // --- 2. TÓN: "DONG" (Hlubší tón se zpožděním) ---
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        
        osc2.connect(gain2);
        gain2.connect(audioCtx.destination);
        
        osc2.frequency.value = 440.00; // Tón A4 (hlubší tón z předchozího skriptu)
        
        // Zpoždění druhého tónu o 0.25 sekundy po prvním
        const startTimeDong = audioCtx.currentTime + 0.25; 
        
        gain2.gain.setValueAtTime(0.25, startTimeDong);
        // Druhý tón necháme doznít o něco déle, aby zvuk působil přirozeně
        gain2.gain.exponentialRampToValueAtTime(0.01, startTimeDong + 0.6);
        
        osc2.start(startTimeDong);
        osc2.stop(startTimeDong + 0.6);

    } catch(e) { console.log("Audio API nepodporováno nebo blokováno", e); }
}

function updateMainHeaderDisplay(text){
    const header=document.getElementById("mainHeader");
    if(!header) return;
    if (header.innerText !== text) {
        header.innerText = text;
        if (text !== "---") {
            header.classList.add("blink"); 
            setTimeout(() => header.classList.remove("blink"), 8000); 
        } else {
            header.classList.remove("blink"); 
        }
    }
}

window.sendVzkaz = function(inputId) {
    const inputEl = document.getElementById(inputId);
    if (!inputEl) return;
    const textvzkazu = inputEl.value.trim();
    if(!textvzkazu) {
        alert("Napiš nejdřív nějaký text vzkazu!");
        return;
    }
    const novyVzkazRef = push(ref(db, 'vzkazy_list'));
    set(novyVzkazRef, {
        text: textvzkazu,
        time: Date.now()
    });
    inputEl.value = ""; 
}

window.deleteVzkaz = function(key) {
    remove(ref(db, 'vzkazy_list/' + key));
}

onValue(ref(db, 'vzkazy_list'), snap => {
    const data = snap.val();
    const ticker = document.getElementById("tickerText");
    const listEl = document.getElementById("setupVzkazyList");
    
    if(!ticker) return;

    if(data) {
        const vzkazyPole = Object.entries(data).map(([key, val]) => ({...val, key})).sort((a,b) => b.time - a.time);
        let tickerText = "⚠️ ";
        vzkazyPole.forEach((v, index) => {
            const cas = new Date(v.time).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
            tickerText += `VZKAZ: ${v.text} (${cas}) `;
            if(index < vzkazyPole.length - 1) tickerText += `   *** `;
        });
        tickerText += `            *** `;
        ticker.innerText = tickerText;

        if(listEl) {
            listEl.innerHTML = "";
            vzkazyPole.forEach(v => {
                const cas = new Date(v.time).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
                listEl.innerHTML += `
                    <div class="vzkazItem">
                        <div>
                            <span>${v.text}</span>
                            <small>Odesláno: ${cas}</small>
                        </div>
                        <button onclick="deleteVzkaz('${v.key}')">❌ Smazat</button>
                    </div>
                `;
            });
        }
    } else {
        ticker.innerText = "Žádné nové vzkazy.";
        if(listEl) listEl.innerHTML = '<div style="color:#94a3b8; padding:10px; font-size:0.9em;">Žádné aktivní vzkazy</div>';
    }
});

onValue(ref(db,'lisy'),async snap=>{ 
  const data = snap.val();
  const currentLisy = data ? Object.values(data) : Array.from({length:LIS_COUNT},()=>emptyLis());
  
  for (let i = 0; i < LIS_COUNT; i++) {
    const lis = currentLisy[i] || emptyLis();
    const oldLis = lastLisy[i] || emptyLis();

    const hasContact = !!lis.kontakt;
    const oldHasContact = !!(oldLis && oldLis.kontakt);
    const dataChanged = (hasContact && (!oldHasContact || oldLis.kontakt !== lis.kontakt || oldLis.prurez !== lis.prurez || oldLis.jmeno !== lis.jmeno));
    
    if (hasContact && dataChanged) {
        autoBlink(i); 
    }
  }

  lisy = currentLisy;
  while(lisy.length<LIS_COUNT) lisy.push(emptyLis());
  lastLisy = JSON.parse(JSON.stringify(lisy)); 
  renderAll();
});

onValue(ref(db,'pozadavky'), snap => {
  const data = snap.val();
  const currentPozadavky = data ? Object.entries(data).map(([k,v])=>({...v,key:k})).sort((a,b)=>a.time-b.time) : [];
  
  currentPozadavky.forEach(p => {
      if (!lastPozadavky.some(oldP => oldP.key === p.key)) {
          setTimeout(() => {
              const setupQueueItem = document.getElementById(`request-${p.key}`);
              const prodQueueItem = document.getElementById(`prodRequest-${p.key}`); 

              if (setupQueueItem) {
                  setupQueueItem.classList.add('new-request-pulse');
                  setTimeout(() => { setupQueueItem.classList.remove('new-request-pulse'); }, 4000); 
              }
              if (prodQueueItem) { 
                  prodQueueItem.classList.add('new-request-pulse');
                  setTimeout(() => { prodQueueItem.classList.remove('new-request-pulse'); }, 4000); 
              }
          }, 50); 
      }
  });

  pozadavky = currentPozadavky;
  lastPozadavky = JSON.parse(JSON.stringify(currentPozadavky)); 
  renderAll();
});

function renderAll(){
    renderLisy("rowTop","rowBottom",true); 
    renderLisy("prodTop","prodBottom",false);
    renderQueue("queueList"); 
    renderProductionQueue(); 
}

function renderLisy(topID, bottomID, isSetup){
    const top=document.getElementById(topID);
    const bottom=document.getElementById(bottomID);
    if(!top || !bottom) return;
    top.innerHTML=""; bottom.innerHTML="";

    for(let i=0; i<LIS_COUNT; i++){
        const d = lisy[i] || emptyLis();
        const assigned = d.kontakt !== "";
        const cardId = isSetup ? `lis${i}` : `prodLis${i}`;
        
        const html = `
            <div class="card ${assigned?'assigned':''}" id="${cardId}">
                <div class="lis">LIS ${i+1}</div>
                <div class="kontakt">${d.kontakt||"---"}</div>
                <div class="prurez">${d.prurez||"---"}</div>
                <div class="jmeno">${d.jmeno||"---"}</div>
                <div class="time">${d.time?timeNow():""}</div>
                ${isSetup ? `<button class="hotovo" onclick="clearLis(${i})">HOTOVO</button>` : ""}
            </div>
        `;
        if(i<4) top.innerHTML += html;
        else bottom.innerHTML += html;
    }
}

function renderQueue(id){ 
 const q=document.getElementById(id);
 if(!q) return;
 q.innerHTML="";

 pozadavky.forEach((p,i)=>{
  q.innerHTML+=`<div class="queueItem" id="request-${p.key}">
  <b>${p.kontakt}</b> - ${p.prurez} - ${p.jmeno}
<span class="time">${new Date(p.time).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'})}</span>
   <div class="assign">
    ${[0,1,2,3,4,5,6,7].map(l=>`<button onclick="assignRequest(${l}, '${p.key}')">L${l+1}</button>`).join('')}
    <button class="deleteBtn" onclick="deleteRequest('${p.key}')">❌</button>
   </div>
  </div>`;
 });
}

function renderProductionQueue(){ 
 const q=document.getElementById("prodQueue");
 if(!q)return;
 q.innerHTML="";

 pozadavky.forEach(p=>{
  q.innerHTML+=`<div class="queueItem" id="prodRequest-${p.key}">
   <b>${p.kontakt}</b> - ${p.prurez} - ${p.jmeno}
   <div class="time">${new Date(p.time).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'})}</div>
  </div>`;
 });
}

window.assignRequest=async function(lisIndex, requestKey){ 
  const p=pozadavky.find(req => req.req === requestKey || req.key === requestKey);
  if(!p) return;

  await set(ref(db,`lisy/${lisIndex}`),{
    kontakt:p.kontakt,
    prurez:p.prurez,
    jmeno:p.jmeno,
    time:Date.now()
  });
  
  const headerText = `${p.kontakt} - ${p.prurez} - ${p.jmeno} → LIS ${lisIndex + 1}`;
  updateMainHeaderDisplay(headerText);
  remove(ref(db,'pozadavky/'+p.key));
}

window.clearLis = async function(i){
    await set(ref(db, `lisy/${i}`), emptyLis());
    updateMainHeaderDisplay("---"); 
};

window.deleteRequest=function(key){ remove(ref(db,'pozadavky/'+key)); } 

window.addRequest=function(){ 
 const kontaktInput=document.getElementById("kontakt");
 const prurezInput=document.getElementById("prurez");
 const jmenoInput=document.getElementById("jmeno");

 const kontakt=kontaktInput.value;
 const prurez=prurezInput.value;
 const jmeno=jmenoInput.value;

 if(!kontakt || !prurez || !jmeno) { 
    alert("Prosím vyplňte všechna pole!");
    return;
 }

 const newRef=push(ref(db,'pozadavky'));
 set(newRef,{kontakt,prurez,jmeno,time:Date.now()});

 kontaktInput.value="";
 prurezInput.value="";
 jmenoInput.value="";
 kontaktInput.focus();
}

window.addRequestSetup=function(){ 
    const kontakt=document.getElementById("setupKontakt").value;
    const prurez=document.getElementById("setupPrurez").value;
    const jmeno=document.getElementById("setupJmeno").value;
    if(!kontakt || !prurez || !jmeno) { 
        alert("Prosím vyplňte všechna pole!");
        return;
    }
    const newRef=push(ref(db,'pozadavky'));
    set(newRef,{kontakt,prurez,jmeno,time:Date.now()});
    document.getElementById("setupKontakt").value="";
    document.getElementById("setupPrurez").value="";
    document.getElementById("setupJmeno").value="";
}

function autoBlink(i){ 
    const card=document.getElementById("lis"+i);
    const prod=document.getElementById("prodLis"+i);
    
    if(card) {
        card.classList.add("active");
        setTimeout(()=>{
            card.classList.remove("active");
            card.classList.add("assigned");
        },1000);
    }
    if(prod) { 
        prod.classList.add("active");
        setTimeout(()=>{
            prod.classList.remove("active");
            prod.classList.add("assigned");
        },1000);
    }
    playTone();
}

function generateQR() {
    const cleanUrl = window.location.href.split('#')[0];
    const targetUrl = cleanUrl + "#requests";
    
    const qrImgEl = document.getElementById("qrCodeImg");
    if(qrImgEl) {
        qrImgEl.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(targetUrl)}`;
    }
    
    const prodQrImgEl = document.getElementById("prodQrCodeImg");
    if(prodQrImgEl) {
        prodQrImgEl.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(targetUrl)}`;
    }
}

window.onload = function() {
    if(window.location.hash === "#requests") {
        requestsMode();
    } else {
        setupMode();
    }
    generateQR();
}
</script>
